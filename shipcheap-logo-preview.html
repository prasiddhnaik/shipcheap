<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShipCheap Logo Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #252525;
        --tile: #101827;
        --cyan: #55d7ff;
        --gold: #f5c84b;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 32px;
        justify-items: center;
      }

      .mark {
        width: 176px;
        height: 176px;
      }

      .lockup {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        color: white;
        font-size: 34px;
        font-weight: 650;
      }

      .mini {
        width: 44px;
        height: 44px;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <svg class="mark" aria-label="ShipCheap logo mark" viewBox="0 0 48 48" fill="none">
        <rect x="4.5" y="4.5" width="39" height="39" rx="9" fill="#101827" stroke="#55D7FF" />
        <circle cx="24" cy="24" r="13.25" stroke="white" stroke-opacity=".16" stroke-width="1.5" />
        <path d="M24 10.75V14.25M24 33.75V37.25M10.75 24H14.25M33.75 24H37.25" stroke="white" stroke-opacity=".22" stroke-width="1.6" stroke-linecap="round" />
        <path d="M13 31L20 24L26.5 28L35 16" stroke="#55D7FF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="13" cy="31" r="3.25" fill="#101827" stroke="#55D7FF" stroke-width="2.4" />
        <circle cx="20" cy="24" r="3" fill="#55D7FF" />
        <circle cx="26.5" cy="28" r="2.7" fill="white" />
        <path d="M35 11.6L40.4 17L35 22.4L29.6 17L35 11.6Z" fill="#F5C84B" />
        <path d="M32.9 17.25L34.45 18.8L37.25 15.45" stroke="#101827" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>

      <div class="lockup">
        <svg class="mini" aria-hidden="true" viewBox="0 0 48 48" fill="none">
          <rect x="4.5" y="4.5" width="39" height="39" rx="9" fill="#101827" stroke="#55D7FF" />
          <circle cx="24" cy="24" r="13.25" stroke="white" stroke-opacity=".16" stroke-width="1.5" />
          <path d="M24 10.75V14.25M24 33.75V37.25M10.75 24H14.25M33.75 24H37.25" stroke="white" stroke-opacity=".22" stroke-width="1.6" stroke-linecap="round" />
          <path d="M13 31L20 24L26.5 28L35 16" stroke="#55D7FF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="13" cy="31" r="3.25" fill="#101827" stroke="#55D7FF" stroke-width="2.4" />
          <circle cx="20" cy="24" r="3" fill="#55D7FF" />
          <circle cx="26.5" cy="28" r="2.7" fill="white" />
          <path d="M35 11.6L40.4 17L35 22.4L29.6 17L35 11.6Z" fill="#F5C84B" />
          <path d="M32.9 17.25L34.45 18.8L37.25 15.45" stroke="#101827" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        ShipCheap
      </div>
    </main>
  </body>
</html>
